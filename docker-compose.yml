version: '3.8'

services:
  redis:
    image: redis:alpine
    container_name: github-agent-redis
    ports:
      - "6379:6379"
    restart: always

  app:
    build: .
    container_name: github-mcp-agent-app
    ports:
      - "8501:8501"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    env_file:
      - .env
    environment:
      - REDIS_HOST=redis
    depends_on:
      - redis
    restart: always
